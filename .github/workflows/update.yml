name: update-data
on:
  schedule:
    - cron: '0 6 * * *'      # daily 06:00 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser
      - run: python build_data.py
      - run: |
          git config user.name  "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data.json
          git commit -m "update data.json" || echo "no changes"
          git push
